_format_version: "1.1"

# =============================================================================
# Kong Declarative Config for Supabase Self-Hosted
# All service hostnames use "eventos-" prefix
# =============================================================================

consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzM1Njg5NjAwLCJleHAiOjIyMDg5ODg4MDB9.Z0B_2lWxfKcUrIWQi1VP4iPH3-0Tud5pJx6h6txIg1Q
  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3MzU2ODk2MDAsImV4cCI6MjIwODk4ODgwMH0.VgceFoQMXOVKX2A_TVHl9DTpVhoD3WIX4aKQJikFJl8

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

# =============================================================================
# Services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Auth (GoTrue)
  # ---------------------------------------------------------------------------
  - name: auth-v1-open
    url: http://eventos-auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://eventos-auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://eventos-auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    _comment: "GoTrue: /auth/v1/* -> eventos-auth:9999"
    url: http://eventos-auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---------------------------------------------------------------------------
  # PostgREST (REST API)
  # ---------------------------------------------------------------------------
  - name: rest-v1
    _comment: "PostgREST: /rest/v1/* -> eventos-rest:3000"
    url: http://eventos-rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---------------------------------------------------------------------------
  # Realtime (WebSocket)
  # ---------------------------------------------------------------------------
  - name: realtime-v1
    _comment: "Realtime: /realtime/v1/* -> eventos-realtime:4000"
    url: http://eventos-realtime:4000/socket/
    routes:
      - name: realtime-v1
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  # ---------------------------------------------------------------------------
  # Storage
  # ---------------------------------------------------------------------------
  - name: storage-v1
    _comment: "Storage: /storage/v1/* -> eventos-storage:5000"
    url: http://eventos-storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors

  # ---------------------------------------------------------------------------
  # MCP (Model Context Protocol) - Studio endpoint
  # ---------------------------------------------------------------------------
  - name: mcp
    _comment: "MCP: /mcp -> eventos-studio:3000/api/mcp"
    url: http://eventos-studio:3000/api/mcp
    routes:
      - name: mcp
        strip_path: true
        paths:
          - /mcp
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  # ---------------------------------------------------------------------------
  # PG Meta (for Studio)
  # ---------------------------------------------------------------------------
  - name: meta
    _comment: "PG Meta: /pg/* -> eventos-meta:8080"
    url: http://eventos-meta:8080/
    routes:
      - name: meta
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
