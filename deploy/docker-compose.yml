version: "3.8"

# =============================================================================
# AppEventosSegopi - Docker Swarm Stack for Portainer
# Self-hosted Supabase + Next.js Application
# =============================================================================
# Deploy: docker stack deploy -c docker-compose.yml eventos
# Prerequisites:
#   1. docker config create eventos_kong_config volumes/api/kong.yml
#   2. Build Next.js image: docker build -t eventos-app:latest ...
#   3. External network red_global must exist
# =============================================================================

networks:
  eventos_internal:
    driver: overlay
    attachable: true
  red_global:
    external: true

volumes:
  eventos_db_data:
    driver: local
  eventos_storage_data:
    driver: local

configs:
  eventos_kong_config_v2:
    external: true

services:
  # ===========================================================================
  # 1. PostgreSQL Database
  # ===========================================================================
  eventos-db:
    image: supabase/postgres:15.8.1.085
    networks:
      - eventos_internal
    ports:
      - "5432:5432"
    volumes:
      - eventos_db_data:/var/lib/postgresql/data:Z
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "5432"
      POSTGRES_PORT: "5432"
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: "3600"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "supabase_admin", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  # 2. Auth - GoTrue
  # ===========================================================================
  eventos-auth:
    image: supabase/gotrue:v2.186.0
    networks:
      - eventos_internal
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}

      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@eventos-db:5432/postgres

      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: "${SITE_URL}/**"
      GOTRUE_DISABLE_SIGNUP: "false"

      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}

      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify

      GOTRUE_SMTP_HOST: ${SMTP_HOST}
      GOTRUE_SMTP_PORT: ${SMTP_PORT}
      GOTRUE_SMTP_USER: ${SMTP_USER}
      GOTRUE_SMTP_PASS: ${SMTP_PASS}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_USER}
      GOTRUE_SMTP_MAX_FREQUENCY: 1ns
      GOTRUE_SMTP_SENDER_NAME: "Eventos SEGOPI"

      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_ENABLE_ANONYMOUS_USERS: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 3. PostgREST - REST API
  # ===========================================================================
  eventos-rest:
    image: postgrest/postgrest:v12.2.12
    networks:
      - eventos_internal
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@eventos-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: "3600"
    healthcheck:
      test: ["NONE"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 4. Realtime - WebSocket
  # ===========================================================================
  eventos-realtime:
    image: supabase/realtime:v2.76.5
    networks:
      - eventos_internal
    environment:
      PORT: "4000"
      APP_NAME: realtime
      DB_HOST: eventos-db
      DB_PORT: "5432"
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      FLY_ALLOC_ID: fly123
      FLY_APP_NAME: realtime
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: ""
      RLIMIT_NOFILE: "10000"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'printf \"GET /api/health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/4000 || exit 1'"]
      interval: 10s
      timeout: 5s
      retries: 15
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 5. Storage API
  # ===========================================================================
  eventos-storage:
    image: supabase/storage-api:v1.37.8
    networks:
      - eventos_internal
    volumes:
      - eventos_storage_data:/var/lib/storage:z
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://eventos-rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@eventos-db:5432/postgres
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: eu-west-1
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://eventos-imgproxy:8080
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:5000/status',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 6. imgproxy - Image Transformation
  # ===========================================================================
  eventos-imgproxy:
    image: darthsim/imgproxy:v3.30.1
    networks:
      - eventos_internal
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # 7. PG Meta - Metadata API for Studio
  # ===========================================================================
  eventos-meta:
    image: supabase/postgres-meta:v0.95.2
    networks:
      - eventos_internal
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: eventos-db
      PG_META_DB_PORT: "5432"
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:8080/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # 8. Kong - API Gateway (exposed to NPM via red_global)
  # ===========================================================================
  eventos-kong:
    image: kong:2.8.1
    networks:
      - eventos_internal
      - red_global
    configs:
      - source: eventos_kong_config_v2
        target: /var/lib/kong/kong.yml
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth,request-termination
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      KONG_NGINX_PROXY_LARGE_CLIENT_HEADER_BUFFERS: "64 160k"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 9. Studio - Supabase Dashboard (exposed to NPM via red_global)
  # ===========================================================================
  eventos-studio:
    image: supabase/studio:latest
    networks:
      - eventos_internal
      - red_global
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: http://eventos-meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: "Eventos SEGOPI"
      DEFAULT_PROJECT_NAME: "Eventos SEGOPI"
      SUPABASE_URL: http://eventos-kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres
    healthcheck:
      test: ["NONE"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # 10. Next.js App (exposed to NPM via red_global)
  # ===========================================================================
  eventos-app:
    image: eventos-app:latest
    networks:
      - eventos_internal
      - red_global
    environment:
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_PUBLIC_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      ADMIN_NOTIFICATION_EMAIL: ${ADMIN_NOTIFICATION_EMAIL}
      CRON_SECRET: ${CRON_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: "Eventos SEGOPI <${SMTP_USER}>"
    healthcheck:
      test: ["NONE"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M
